---
layout: default
---

<section class="hero" style="background-image: url({% include relative-src.html src=page.image %})">
	<div class="inner-hero text-container">
		<div class="hero-text-container">
			<h1><span class="lang-en">{{ page.title }}</span><span class="lang-zh">{{ page.title_zh | default: page.title }}</span></h1>
			<p class="subtext"><span class="lang-en">{{ page.description }}</span><span class="lang-zh">{{ page.description_zh | default: page.description }}</span></p>
		</div>
	</div>
</section>

{{ content }}
